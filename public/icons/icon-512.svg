<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#0a0a0f"/>
  <g transform="translate(256,256)">
    <!-- Hexagonal grid lines -->
    <path d="M-110,-190 L110,-190 L190,0 L110,190 L-110,190 L-190,0 Z" fill="none" stroke="#00fff2" stroke-width="2" opacity="0.3"/>
    <path d="M-70,-120 L70,-120 L120,0 L70,120 L-70,120 L-120,0 Z" fill="none" stroke="#00fff2" stroke-width="1.5" opacity="0.2"/>
    <!-- Lightning bolt -->
    <path d="M-20,-110 L32,-110 L10,-20 L55,-20 L-32,120 L-10,20 L-55,20 Z" fill="#00fff2" opacity="0.9"/>
    <path d="M-20,-110 L32,-110 L10,-20 L55,-20 L-32,120 L-10,20 L-55,20 Z" fill="none" stroke="#00fff2" stroke-width="3" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Corner accents -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#4d7cff" stroke-width="3" opacity="0.6"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#4d7cff" stroke-width="3" opacity="0.6"/>
  <line x1="412" y1="472" x2="472" y2="472" stroke="#4d7cff" stroke-width="3" opacity="0.6"/>
  <line x1="472" y1="412" x2="472" y2="472" stroke="#4d7cff" stroke-width="3" opacity="0.6"/>
  <!-- Title -->
  <text x="256" y="470" text-anchor="middle" fill="#00fff2" font-family="monospace" font-size="28" opacity="0.6">STORMGRID</text>
</svg>
